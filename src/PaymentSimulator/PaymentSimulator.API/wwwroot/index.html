<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        .details { background: #f9f9f9; padding: 1rem; border-radius: 4px; margin-bottom: 2rem; text-align: left; font-size: 0.9rem; }
        .btn { display: block; width: 100%; padding: 0.8rem; margin-bottom: 0.8rem; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Payment Simulator</h1>
        <p>Choose an outcome for your payment</p>
        
        <div class="details">
            <strong>Booking ID:</strong> <span id="bookingId">...</span><br>
            <strong>Amount:</strong> <span id="amount">...</span>
        </div>

        <button class="btn btn-success" onclick="submitStatus('Success')">Payment Success</button>
        <button class="btn btn-danger" onclick="submitStatus('Failure')">Payment Failure</button>
        <button class="btn btn-secondary" onclick="submitStatus('Cancel')">Cancel Payment</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('bookingId');
        const amount = urlParams.get('amount') || '0.00';
        const redirectUrl = urlParams.get('redirectUrl') || 'http://localhost:5173/my-bookings';

        document.getElementById('bookingId').textContent = bookingId;
        document.getElementById('amount').textContent = '₹' + amount;

        async function submitStatus(status) {
            try {
                const response = await fetch('/api/payment/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bookingId, status })
                });

                if (response.ok) {
                    // Redirect back to main application
                    window.location.href = `${redirectUrl}?bookingId=${bookingId}&paymentStatus=${status}`;
                } else {
                    alert('Failed to process simulator action');
                }
            } catch (err) {
                console.error(err);
                alert('Error connecting to simulator API');
            }
        }
    </script>
</body>
</html>
