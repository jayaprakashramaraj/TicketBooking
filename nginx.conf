events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        set $identity_api identity.api;
        set $catalog_api catalog.api;
        set $notification_api notification.api;
        set $booking_api booking.api;

        location /api/auth { proxy_pass http://$identity_api:8080; }
        location /api/shows { proxy_pass http://$catalog_api:8080; }
        location /api/tickets { proxy_pass http://$notification_api:8080; }
        location /api/bookings { proxy_pass http://$booking_api:8080; }

        set $frontend frontend;

        location / {
            proxy_pass http://$frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Payment Simulator Port
    server {
        listen 5006;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        set $paymentsimulator paymentsimulator;

        location /api/payment {
            proxy_pass http://$paymentsimulator:8080;
        }

        location / {
            proxy_pass http://$paymentsimulator:8080;
        }
    }
}
