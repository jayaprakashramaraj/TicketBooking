services:
  identity.api:
    build:
      context: .
      dockerfile: src/Identity/Identity.API/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=30;Encrypt=False;"
      JWT_SECRET: "YourSuperSecretKeyThatIsAtLeast32CharsLong!"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
    depends_on:
      sqlserver:
        condition: service_healthy

  catalog.api:
    build:
      context: .
      dockerfile: src/Catalog/Catalog.API/Dockerfile
    environment:
      ConnectionStrings__MongoConnection: "mongodb://mongodb:27017"
      DISABLE_CORS: "true"
    depends_on:
      mongodb:
        condition: service_healthy

  booking.api:
    build:
      context: .
      dockerfile: src/Booking/Booking.API/Dockerfile
    environment:
      DB_CONNECTION: "Server=sqlserver;Database=BookingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=30;Encrypt=False;"
      REDIS_HOST: "redis:6379"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
      PaymentSimulatorUrl: "http://localhost:5002/payment-simulator"
      UIBaseUrl: "http://localhost:5002"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment.api:
    build:
      context: .
      dockerfile: src/Payment/Payment.API/Dockerfile
    environment:
      DB_CONNECTION: "Server=sqlserver;Database=PaymentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=30;Encrypt=False;"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  paymentsimulator:
    build:
      context: .
      dockerfile: src/PaymentSimulator/PaymentSimulator.API/Dockerfile
    environment:
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification.api:
    build:
      context: .
      dockerfile: src/Notification/Notification.API/Dockerfile
    environment:
      REDIS_HOST: "redis:6379"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5002:80"
    depends_on:
      - identity.api
      - catalog.api
      - booking.api
      - payment.api
      - notification.api
      - paymentsimulator

  frontend:
    build:
      context: ./ticketbooking-ui
      dockerfile: Dockerfile
    depends_on:
      - identity.api
      - catalog.api
      - booking.api

  # Internal infrastructure for full Docker mode. Ports are not published to the host.
  # Use docker-compose.infra.yml directly when debugging APIs locally from Visual Studio.
  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  sqlserver_data:
  mongodb_data:
  redis_data:
