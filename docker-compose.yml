services:
  identity.api:
    build:
      context: .
      dockerfile: src/Identity/Identity.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=30;Encrypt=False;"
      JWT_SECRET: "YourSuperSecretKeyThatIsAtLeast32CharsLong!"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
    depends_on:
      sqlserver:
        condition: service_healthy

  catalog.api:
    build:
      context: .
      dockerfile: src/Catalog/Catalog.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__MongoConnection: "mongodb://mongodb:27017"
      DISABLE_CORS: "true"
    depends_on:
      mongodb:
        condition: service_healthy

  booking.api:
    build:
      context: .
      dockerfile: src/Booking/Booking.API/Dockerfile
    ports:
      - "5005:8080"
    environment:
      DB_CONNECTION: "Server=sqlserver;Database=BookingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=30;Encrypt=False;"
      REDIS_HOST: "redis:6379"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
      PaymentSimulatorUrl: "http://localhost:5006"
      UIBaseUrl: "http://localhost:5002"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment.api:
    build:
      context: .
      dockerfile: src/Payment/Payment.API/Dockerfile
    ports:
      - "5003:8080"
    environment:
      DB_CONNECTION: "Server=sqlserver;Database=PaymentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=30;Encrypt=False;"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  paymentsimulator:
    build:
      context: .
      dockerfile: src/PaymentSimulator/PaymentSimulator.API/Dockerfile
    environment:
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification.api:
    build:
      context: .
      dockerfile: src/Notification/Notification.API/Dockerfile
    ports:
      - "5004:8080"
    environment:
      REDIS_HOST: "redis:6379"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      DISABLE_CORS: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5002:80"
      - "5006:5006"
    depends_on:
      - identity.api
      - catalog.api
      - booking.api
      - notification.api
      - paymentsimulator

  frontend:
    build:
      context: ./ticketbooking-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - identity.api
      - catalog.api
      - booking.api

  # External Infrastructure Services
  rabbitmq:
    extends:
      file: docker-compose.infra.yml
      service: rabbitmq

  sqlserver:
    extends:
      file: docker-compose.infra.yml
      service: sqlserver

  mongodb:
    extends:
      file: docker-compose.infra.yml
      service: mongodb

  redis:
    extends:
      file: docker-compose.infra.yml
      service: redis

volumes:
  sqlserver_data:
  mongodb_data:
  redis_data:
