services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1434:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  identity.api:
    build:
      context: .
      dockerfile: Identity.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False;"
    depends_on:
      sqlserver:
        condition: service_healthy

  catalog.api:
    build:
      context: .
      dockerfile: Catalog.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__MongoConnection: "mongodb://mongodb:27017"
    depends_on:
      mongodb:
        condition: service_healthy

  booking.api:
    build:
      context: .
      dockerfile: Booking.API/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=BookingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False;"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMQHost: rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment.api:
    build:
      context: .
      dockerfile: Payment.API/Dockerfile
    ports:
      - "5003:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PaymentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False;"
      RabbitMQHost: rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification.api:
    build:
      context: .
      dockerfile: Notification.API/Dockerfile
    ports:
      - "5004:8080"
    environment:
      RabbitMQHost: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5002:80"
    depends_on:
      - booking.api

  frontend:
    build:
      context: ./ticketbooking-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - identity.api
      - catalog.api
      - booking.api
